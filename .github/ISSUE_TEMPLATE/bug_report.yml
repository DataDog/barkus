name: Bug Report
description: Report a bug in Barkus
labels: ["type/bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the sections below so we can reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
      placeholder: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Run `barkus generate ...`
        2. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Versions and platform information.
      placeholder: |
        - Rust version: (rustc --version)
        - Go version: (go version)
        - OS: (e.g. macOS 15.2, Ubuntu 24.04)
        - Barkus commit or tag:
    validations:
      required: true

  - type: dropdown
    id: grammar
    attributes:
      label: Grammar used
      description: Which grammar frontend is involved, if applicable?
      options:
        - N/A
        - ANTLR
        - PEG
        - SQL
        - JSON
        - Other
    validations:
      required: false

  - type: textarea
    id: decision-tape
    attributes:
      label: Decision tape
      description: |
        If the bug involves incorrect generation, attach the decision tape bytes
        that trigger it. Tape determinism is a core invariant — a reproducing tape
        helps us pinpoint the issue quickly.
      placeholder: Paste or attach the tape bytes here.
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Logs, screenshots, or anything else that might help.
    validations:
      required: false
